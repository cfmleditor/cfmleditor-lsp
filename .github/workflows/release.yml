name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fetch Lucee docs
        run: ./scripts/fetch-docs.sh

      - name: Generate built-in entries
        run: go run scripts/gen-builtin.go

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o cfmleditor-lsp .

      - name: Package
        run: tar czf cfmleditor-lsp-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz cfmleditor-lsp

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: cfmleditor-lsp-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
